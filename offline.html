<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071f36" />
  <title>FPV Arbitragem | Sem ligação</title>
  <style>
    :root{--navy:#071f36;--blue:#0f6ea8;--teal:#139c8b;--bg:#f3f7fb;--line:#d9e4ec;--muted:#637487}*{box-sizing:border-box}body{margin:0;min-height:100dvh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f8fcff,var(--bg));display:grid;place-items:center;padding:24px;color:var(--navy)}.card{width:min(560px,100%);background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 50px rgba(7,31,54,.12);padding:28px}.mark{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;display:grid;place-items:center;font-weight:900;margin-bottom:18px}h1{margin:0 0 10px;font-size:1.8rem;letter-spacing:-.04em}p{color:var(--muted);line-height:1.55}.btn{display:inline-flex;margin-top:12px;background:var(--navy);color:#fff;text-decoration:none;font-weight:800;padding:12px 16px;border-radius:14px}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">FPV</div>
    <h1>Sem ligação à rede</h1>
    <p>A Plataforma de Gestão da Arbitragem está sem ligação neste momento. Alguns dados já guardados neste dispositivo poderão continuar disponíveis quando regressar à aplicação, mas operações que dependam de sincronização institucional ficarão indisponíveis.</p>
    <a class="btn" href="index.html">Voltar à plataforma</a>
  </main>
</body>
</html>
